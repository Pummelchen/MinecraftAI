global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: pummelchen-vps

rule_files:
  - /etc/prometheus/pummelchen-rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: node
    static_configs:
      - targets:
          - 127.0.0.1:9100

  - job_name: blackbox
    static_configs:
      - targets:
          - 127.0.0.1:9115

  - job_name: pummelchen_minecraft
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:7792

  - job_name: pummelchen_http
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://127.0.0.1:7788/
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: pummelchen_tcp
    metrics_path: /probe
    params:
      module:
        - tcp_connect
    static_configs:
      - targets:
          - 127.0.0.1:7788
          - 127.0.0.1:25565
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115
