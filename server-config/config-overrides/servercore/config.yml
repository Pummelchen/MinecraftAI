# ServerCore main configuration — Pummelchen Server
# Activation range + dynamic scaling enabled for ~30-50% entity tick reduction.
# See: https://github.com/Wesley1808/ServerCore

# Most miscellaneous feature toggles.
features:
  prevent-enderpearl-chunkloading: false
  chunk-tick-distance-affects-random-ticks: false
  prevent-moving-into-unloaded-chunks: false
  autosave-interval-seconds: 300
  xp-merge-fraction: 40
  xp-merge-radius: 0.5
  item-merge-radius: 0.5
  lobotomize-villagers:
    enabled: false
    tick-interval: 20

dynamic:
  # Automatically adjusts sim distance, chunk-tick distance, mobcaps and
  # view distance when MSPT exceeds the target.
  enabled: true
  target-mspt: 35
  default-values:
    CHUNK_TICK_DISTANCE: 5
    MOBCAP_PERCENTAGE: 100
  dynamic-settings:
    - setting: CHUNK_TICK_DISTANCE
      max: 8
      min: 4
      increment: 1
      interval: 15
    - setting: MOBCAP_PERCENTAGE
      max: 100
      min: 50
      increment: 10
      interval: 15
    - setting: SIMULATION_DISTANCE
      max: 6
      min: 3
      increment: 1
      interval: 15
    - setting: CHUNK_TICK_DISTANCE
      max: 4
      min: 2
      increment: 1
      interval: 15
    - setting: MOBCAP_PERCENTAGE
      max: 50
      min: 30
      increment: 10
      interval: 15
    - setting: SIMULATION_DISTANCE
      max: 3
      min: 2
      increment: 1
      interval: 15
    - setting: VIEW_DISTANCE
      max: 8
      min: 5
      increment: 1
      interval: 150

activation-range:
  enabled: true
  tick-new-entities: true
  use-vertical-range: false
  # Skip 1/4 of non-immune entity ticks for extra savings.
  skip-non-immune: true
  villager-tick-panic: true
  villager-work-immunity-after: 20
  villager-work-immunity-for: 20
  excluded-entity-types:
    - minecraft:hopper_minecart
    - minecraft:warden
    - minecraft:ghast
  default-activation-type:
    activation-range: 16
    tick-interval: 20
    wakeup-interval: -1
    extra-height-up: false
    extra-height-down: false
  custom-activation-types:
    - name: raider
      entity-matcher:
        - "typeof:raider"
      activation-range: 48
      tick-interval: 20
      wakeup-interval: 20
      extra-height-up: true
      extra-height-down: false
    - name: water
      entity-matcher:
        - "typeof:water_animal"
      activation-range: 16
      tick-interval: 20
      wakeup-interval: 60
      extra-height-up: false
      extra-height-down: false
    - name: villager
      entity-matcher:
        - "typeof:villager"
      activation-range: 16
      tick-interval: 20
      wakeup-interval: 30
      extra-height-up: false
      extra-height-down: false
    - name: zombie
      entity-matcher:
        - "minecraft:zombie"
        - "minecraft:husk"
      activation-range: 16
      tick-interval: 20
      wakeup-interval: 20
      extra-height-up: true
      extra-height-down: false
    - name: monster-below
      entity-matcher:
        - "minecraft:creeper"
        - "minecraft:slime"
        - "minecraft:magma_cube"
        - "minecraft:hoglin"
      activation-range: 32
      tick-interval: 20
      wakeup-interval: 20
      extra-height-up: true
      extra-height-down: true
    - name: flying-monster
      entity-matcher:
        - "minecraft:ghast"
        - "minecraft:phantom"
      activation-range: 48
      tick-interval: 20
      wakeup-interval: 20
      extra-height-up: true
      extra-height-down: false
    - name: monster
      entity-matcher:
        - "typeof:monster"
      activation-range: 32
      tick-interval: 20
      wakeup-interval: 20
      extra-height-up: true
      extra-height-down: false
    - name: animal
      entity-matcher:
        - "typeof:animal"
        - "typeof:ambient"
      activation-range: 16
      tick-interval: 20
      wakeup-interval: 60
      extra-height-up: false
      extra-height-down: false
    - name: creature
      entity-matcher:
        - "typeof:mob"
      activation-range: 24
      tick-interval: 20
      wakeup-interval: 30
      extra-height-up: false
      extra-height-down: false
