<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pummelchen Release Details</title>
  <link href="assets/site-theme.css?v=20260620-glass2-sun60" rel="stylesheet">
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('pummelchen-site-theme')||'glass'}catch{document.documentElement.dataset.theme='glass'}</script>
  <script src="assets/site-theme.js?v=20260620-glass2-sun60" defer></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030604;
      --panel: #0b120e;
      --panel-2: #101a13;
      --line: #263628;
      --text: #f3f6f1;
      --muted: #b7c0b6;
      --accent: #79d98d;
      --accent-2: #8cc7ff;
      --danger: #ff7777;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 0%, #122015 0, #030604 360px);
      color: var(--text);
      font: 16px/1.5 ui-rounded, "Avenir Next", "Trebuchet MS", system-ui, sans-serif;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }
    a { color: var(--accent); font-weight: 800; }
    .back {
      display: inline-flex;
      margin-bottom: 28px;
      color: var(--muted);
      text-decoration: none;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 1;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 820px;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 28px 0 34px;
    }
    .pill {
      border: 1px solid var(--line);
      background: rgba(16, 26, 19, 0.86);
      border-radius: 999px;
      padding: 8px 13px;
      color: var(--text);
      font-weight: 800;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
      margin: 0 0 28px;
    }
    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(16, 26, 19, 0.96), rgba(8, 14, 10, 0.96));
      border-radius: 8px;
      padding: 18px;
      min-height: 112px;
    }
    .label {
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .value {
      overflow-wrap: anywhere;
      font-size: 1.12rem;
      font-weight: 900;
    }
    .section {
      border-top: 1px solid var(--line);
      padding-top: 28px;
      margin-top: 28px;
    }
    h2 {
      margin: 0 0 14px;
      font-size: 1.65rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    th, td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      width: 230px;
      color: var(--muted);
      background: var(--panel-2);
    }
    tr:last-child th, tr:last-child td { border-bottom: 0; }
    .downloads {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .download {
      display: block;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-decoration: none;
    }
    .download span {
      display: block;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }
    .error {
      border-color: rgba(255, 119, 119, 0.45);
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="/">Back to Pummelchen Server</a>
    <header>
      <h1 id="releaseTitle">Release Details</h1>
      <p id="releaseSubtitle" class="subtitle">Loading release metadata...</p>
      <div id="pillRow" class="pill-row"></div>
    </header>

    <section class="grid" id="summaryGrid" aria-label="Release summary"></section>

    <section class="section">
      <h2>Downloads</h2>
      <div id="downloads" class="downloads"></div>
    </section>

    <section class="section">
      <h2>Release Metadata</h2>
      <table>
        <tbody id="metadataRows"></tbody>
      </table>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const releaseID = params.get('release') || '';
    const releasePattern = /^release_[A-Za-z0-9_.-]+$/;
    const title = document.getElementById('releaseTitle');
    const subtitle = document.getElementById('releaseSubtitle');
    const pillRow = document.getElementById('pillRow');
    const summaryGrid = document.getElementById('summaryGrid');
    const downloads = document.getElementById('downloads');
    const metadataRows = document.getElementById('metadataRows');

    function escapeHTML(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function valueOrDash(value) {
      return value === undefined || value === null || value === '' ? '-' : value;
    }

    function addCard(label, value) {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `<div class="label">${escapeHTML(label)}</div><div class="value">${escapeHTML(valueOrDash(value))}</div>`;
      summaryGrid.appendChild(card);
    }

    function addPill(value) {
      if (!value) return;
      const pill = document.createElement('span');
      pill.className = 'pill';
      pill.textContent = value;
      pillRow.appendChild(pill);
    }

    function addRow(label, value) {
      const row = document.createElement('tr');
      row.innerHTML = `<th>${escapeHTML(label)}</th><td>${escapeHTML(valueOrDash(value))}</td>`;
      metadataRows.appendChild(row);
    }

    function addDownload(label, url, sha) {
      if (!url) return;
      const link = document.createElement('a');
      link.className = 'download';
      link.href = url;
      link.innerHTML = `${escapeHTML(label)}<span>${escapeHTML(url)}</span>${sha ? `<span>SHA256: ${escapeHTML(sha)}</span>` : ''}`;
      downloads.appendChild(link);
    }

    async function loadRelease() {
      if (!releasePattern.test(releaseID)) {
        title.textContent = 'Release Not Found';
        subtitle.textContent = 'The release id is missing or invalid.';
        subtitle.classList.add('error');
        return;
      }
      title.textContent = releaseID;
      const metadataURL = `/downloads/releases/${encodeURIComponent(releaseID)}/current-release.json`;
      let data;
      try {
        const response = await fetch(metadataURL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        data = await response.json();
      } catch (error) {
        subtitle.textContent = `Release metadata could not be loaded from ${metadataURL}.`;
        subtitle.classList.add('error');
        return;
      }

      subtitle.textContent = data.notes || 'Pummelchen Minecraft release metadata.';
      addPill(data.status);
      addPill(`Minecraft ${data.minecraft_version || data.minecraftVersion || '-'}`);
      addPill(`NeoForge ${data.loader_version || data.loaderVersion || '-'}`);

      addCard('Release ID', data.release_id || data.releaseID || releaseID);
      addCard('Status', data.status);
      addCard('Created At', data.created_at || data.createdAt);
      addCard('Activated At', data.activated_at || data.activatedAt);
      addCard('Minecraft', data.minecraft_version || data.minecraftVersion);
      addCard('NeoForge', data.loader_version || data.loaderVersion);

      addDownload('Client ZIP', data.client_zip_url || data.clientZipURL, data.client_zip_sha256 || data.clientZipSHA256);
      addDownload('Modpack MRPACK', data.mrpack_url || data.mrpackURL, data.mrpack_sha256 || data.mrpackSHA256);
      addDownload('Client Manifest', data.manifest_url || data.manifestURL, data.manifest_sha256 || data.manifestSHA256);

      [
        ['Release ID', data.release_id || data.releaseID || releaseID],
        ['Server Key', data.server_key || data.serverKey],
        ['Status', data.status],
        ['Created At', data.created_at || data.createdAt],
        ['Activated At', data.activated_at || data.activatedAt],
        ['Minecraft Version', data.minecraft_version || data.minecraftVersion],
        ['NeoForge Version', data.loader_version || data.loaderVersion],
        ['Client ZIP SHA256', data.client_zip_sha256 || data.clientZipSHA256],
        ['MRPACK SHA256', data.mrpack_sha256 || data.mrpackSHA256],
        ['Notes', data.notes]
      ].forEach(([label, value]) => addRow(label, value));
    }

    loadRelease();
  </script>
</body>
</html>
