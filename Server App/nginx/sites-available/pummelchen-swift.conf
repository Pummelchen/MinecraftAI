server {
    listen 80;
    listen [::]:80;
    server_name pummelchen.91.99.176.243.nip.io;

    root /opt/pummelchen-swift/runtime/site/public;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/pummelchen-swift/runtime/site/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 7788 default_server;
    listen [::]:7788 default_server;
    server_name _;

    root /opt/pummelchen-swift/runtime/site/public;

    access_log /var/log/nginx/pummelchen_swift_access.log;
    error_log /var/log/nginx/pummelchen_swift_error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/pummelchen-swift/runtime/site/public;
    }

    location / {
        return 301 https://pummelchen.91.99.176.243.nip.io$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pummelchen.91.99.176.243.nip.io;

    root /opt/pummelchen-swift/runtime/site/public;
    index index.html;

    access_log /var/log/nginx/pummelchen_swift_ssl_access.log;
    error_log /var/log/nginx/pummelchen_swift_ssl_error.log;

    ssl_certificate /etc/letsencrypt/live/pummelchen.91.99.176.243.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pummelchen.91.99.176.243.nip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location /api/ {
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location ~ ^/(live-stats|update-activity|neoforge-version|release-health)\.json$ {
        open_file_cache off;
        sendfile off;
        add_header Cache-Control "no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location ~ ^/downloads/current-release\.(json|txt)$ {
        open_file_cache off;
        sendfile off;
        add_header Cache-Control "no-store, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location /downloads/ {
        alias /opt/pummelchen-swift/runtime/site/public/downloads/;
        autoindex off;
        add_header Cache-Control "public, max-age=60";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files $uri $uri/ /index.html;
    }
}
