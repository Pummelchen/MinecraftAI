name: Pummelchen Swift Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  swift:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build --package-path swift/PummelchenSwift

      - name: Test
        run: swift test --package-path swift/PummelchenSwift
